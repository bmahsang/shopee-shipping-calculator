<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼피 배송비 조회기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f0f2f5;color:#333}
.header{background:linear-gradient(135deg,#ee4d2d,#ff6633);padding:24px 0;text-align:center;color:#fff}
.header h1{font-size:22px;font-weight:700}
.header p{font-size:12px;opacity:.85;margin-top:4px}
.wrap{max-width:960px;margin:0 auto;padding:20px 16px}
.card{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:16px}
label{font-size:14px;font-weight:600;color:#555;display:block;margin-bottom:8px}
#q{width:100%;padding:14px 16px;border:2px solid #ddd;border-radius:8px;font-size:18px;transition:border .2s}
#q:focus{outline:none;border-color:#ee4d2d}
.suggest{margin-top:8px;max-height:220px;overflow-y:auto;display:none}
.sg{padding:8px 12px;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:13px;display:flex;justify-content:space-between}
.sg:hover{background:#fff5f0}
.sg .nm{font-weight:600}
.sg .cd{color:#999;font-size:12px}
.total-bar{display:flex;justify-content:space-between;align-items:center}
.total-bar .tl{font-size:13px;color:#666}
.total-bar .tv{font-size:22px;font-weight:800;color:#ee4d2d}
.total-bar .tc{font-size:12px;color:#999}
.rc{background:#fff;border-radius:12px;padding:18px 22px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:12px;position:relative}
.rc .x{position:absolute;top:10px;right:14px;background:none;border:none;color:#bbb;font-size:20px;cursor:pointer;padding:4px 8px}
.rc .x:hover{color:#ee4d2d}
.rc .pn{font-size:16px;font-weight:700;margin-bottom:2px}
.rc .pm{font-size:11px;color:#888;margin-bottom:14px}
.rc .pm span{margin-right:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.gi{background:#f8f9fa;border-radius:8px;padding:10px 12px}
.gi .gl{font-size:10px;color:#999;margin-bottom:3px}
.gi .gv{font-size:14px;font-weight:700}
.gi.hl{background:#fff5f0;border:1px solid #ffcbb8}
.gi.hl .gv{color:#ee4d2d}
.err{background:#fff3f3;border:1px solid #ffccc7;border-radius:8px;padding:12px 16px;color:#cf1322;font-size:13px;margin-bottom:10px}
.bt{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.bt th,.bt td{padding:7px 10px;text-align:center;border-bottom:1px solid #eee}
.bt th{background:#f8f9fa;color:#666;font-weight:600}
.bt td:first-child{font-weight:700}
.ft{text-align:center;padding:16px;font-size:11px;color:#aaa}
</style>
</head>
<body>
<div class="header">
<h1>Shopee SG 배송비 조회기</h1>
<p>바코드 입력 &rarr; 무게/부피/박스 기반 배송비 자동 계산</p>
</div>
<div class="wrap">
<div class="card">
<label>바코드 또는 제품명 입력 (13자리 입력 시 자동 조회 / Enter로 검색)</label>
<input type="text" id="q" placeholder="바코드 13자리 또는 제품명 입력..." autocomplete="off">
<div class="suggest" id="sg"></div>
</div>
<div class="card total-bar" id="totalBar" style="display:none">
<div><div class="tl">총 셀러부담 배송비 합계</div><div class="tc" id="tc"></div></div>
<div class="tv" id="tv">SGD 0.00</div>
</div>
<div id="list"></div>
<div class="card">

</table>
</div>
</div>

var added=[];
var q=document.getElementById('q');

q.addEventListener('input',function(){
  var v=q.value.trim();
  if(/^\d{13}$/.test(v)&&DB[v]){
    add(v,DB[v]);
    q.value='';
    hideSg();
    return;
  }
  if(v.length>=2){showSg(v);}else{hideSg();}
});

q.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    e.preventDefault();
    var v=q.value.trim();
    if(!v)return;
    if(DB[v]){add(v,DB[v]);q.value='';hideSg();return;}
    var found=null;
    for(var k in DB){if(DB[k].n.indexOf(v)!==-1){found=[k,DB[k]];break;}}
    if(found){add(found[0],found[1]);q.value='';hideSg();}
    else{showErr(v);}
  }
});

function showSg(v){
  var vl=v.toLowerCase();
  var sgEl=document.getElementById('sg');
  var matches=[];
  for(var k in DB){
    var p=DB[k];
    if(k.indexOf(vl)!==-1||p.n.toLowerCase().indexOf(vl)!==-1||(p.b&&p.b.toLowerCase().indexOf(vl)!==-1)){
      matches.push([k,p]);
      if(matches.length>=20)break;
    }
  }
  if(!matches.length){hideSg();return;}
  sgEl.innerHTML=matches.map(function(m){
    return '<div class="sg" data-code="'+m[0]+'"><span class="nm">'+m[1].n+'</span><span class="cd">'+m[0]+'</span></div>';
  }).join('');
  sgEl.style.display='block';
  var items=sgEl.querySelectorAll('.sg');
  for(var i=0;i<items.length;i++){
    (function(item){
      item.addEventListener('mousedown',function(e){
        e.preventDefault();
        var code=item.getAttribute('data-code');
        add(code,DB[code]);
        q.value='';
        hideSg();
      });
      item.addEventListener('click',function(e){
        var code=item.getAttribute('data-code');
        add(code,DB[code]);
        q.value='';
        hideSg();
      });
    })(items[i]);
  }
}

function hideSg(){document.getElementById('sg').style.display='none';}

function showErr(v){
  var d=document.createElement('div');
  d.className='err';
  d.textContent='"'+v+'" - 등록되지 않은 바코드입니다.';
  document.getElementById('list').prepend(d);
  document.getElementById('totalBar').style.display='flex';
  setTimeout(function(){d.remove();},3000);
}

function add(code,p){
  var idx=added.length;
  added.push({code:code,sf:p.sf});
  updateTotal();
  var d=document.createElement('div');
  d.className='rc';d.id='c'+idx;
  var sc=p.s==='상시'?'#52c41a':'#faad14';
  d.innerHTML='<button class="x" data-i="'+idx+'">\u00D7</button>'
    +'<div class="pn">'+p.n+'</div>'
    +'<div class="pm"><span>'+p.b+'</span><span>'+p.c+'</span><span>'+code+'</span><span style="color:'+sc+'">'+p.s+'</span></div>'
    +'<div class="grid">'
    +gi('실중량',p.w+'g',0)
    +gi('단상자 사이즈',p.sz,0)
    +gi('배정 박스',p.bx+' ('+p.bxd+')',0)
    +gi('체적중량',p.vw.toLocaleString()+'g',0)
    +gi('적용중량 ('+p.at+')',p.sw.toLocaleString()+'g',0)
    +gi('총 배송비','SGD '+p.tf.toFixed(2),0)
    +gi('셀러부담 배송비','SGD '+p.sf.toFixed(2),1)
    +'</div>';
  var xBtn=d.querySelector('.x');
  xBtn.addEventListener('click',function(){
    var i=parseInt(this.getAttribute('data-i'));
    var el=document.getElementById('c'+i);
    if(el)el.remove();
    added[i]=null;
    updateTotal();
  });
  document.getElementById('list').prepend(d);
  document.getElementById('totalBar').style.display='flex';
}

function gi(l,v,hl){return '<div class="gi'+(hl?' hl':'')+'"><div class="gl">'+l+'</div><div class="gv">'+v+'</div></div>';}

function updateTotal(){
  var active=added.filter(function(x){return x;});
  var total=active.reduce(function(s,x){return s+x.sf;},0);
  document.getElementById('tv').textContent='SGD '+total.toFixed(2);
  document.getElementById('tc').textContent=active.length+'개 제품';
  if(!active.length)document.getElementById('totalBar').style.display='none';
}
</script>
